<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgenticTown — Multi-Agent Civilization</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0a0e17 0%, #1a1f2e 100%);
    min-height: 100vh;
    color: #e0e0e0;
    padding: 20px;
}
.container { max-width: 1400px; margin: 0 auto; }
.header {
    background: linear-gradient(135deg, #1a2332 0%, #243447 100%);
    border-radius: 12px;
    padding: 20px 30px;
    margin-bottom: 30px;
    border: 1px solid #2a3a5a;
}
.title { font-size: 32px; font-weight: 700; color: #f0c040; margin-bottom: 8px; }
.subtitle { font-size: 14px; color: #8090a8; letter-spacing: 0.5px; }
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}
.stat-card {
    background: linear-gradient(135deg, #1a2332 0%, #243447 100%);
    border-radius: 12px;
    padding: 20px;
    border: 1px solid #2a3a5a;
}
.stat-label { font-size: 12px; color: #8090a8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.stat-value { font-size: 28px; font-weight: 700; color: #f0c040; }
.section {
    background: linear-gradient(135deg, #1a2332 0%, #243447 100%);
    border-radius: 12px;
    padding: 25px;
    margin-bottom: 25px;
    border: 1px solid #2a3a5a;
}
.section-title { font-size: 20px; font-weight: 700; color: #f0c040; margin-bottom: 20px; }
.agent-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 15px;
}
.agent-card {
    background: rgba(26, 35, 50, 0.6);
    border-radius: 8px;
    padding: 15px;
    border: 1px solid #3a4a6a;
}
.agent-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.agent-emoji { font-size: 32px; }
.agent-info { flex: 1; }
.agent-name { font-size: 16px; font-weight: 700; color: #fff; }
.agent-role { font-size: 12px; color: #8090a8; }
.agent-balance { font-size: 14px; color: #f0c040; font-weight: 600; margin-top: 8px; }
.facility-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 15px;
}
.facility-card {
    background: rgba(26, 35, 50, 0.6);
    border-radius: 8px;
    padding: 15px;
    border: 1px solid #3a4a6a;
}
.facility-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.facility-emoji { font-size: 28px; }
.facility-name { font-size: 16px; font-weight: 700; color: #fff; }
.facility-cost { font-size: 12px; color: #8090a8; }
.progress-bar {
    width: 100%;
    height: 6px;
    background: #2a3a5a;
    border-radius: 3px;
    margin-top: 10px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #f09030, #f0c040);
    transition: width 0.5s;
}
.status-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    margin-top: 8px;
}
.status-active { background: rgba(34, 201, 122, 0.2); color: #22c97a; }
.status-funding { background: rgba(240, 144, 48, 0.2); color: #f09030; }
.status-planned { background: rgba(90, 100, 128, 0.2); color: #5a6480; }
.event-list { max-height: 400px; overflow-y: auto; }
.event {
    padding: 12px;
    border-left: 3px solid #5a6480;
    margin-bottom: 10px;
    background: rgba(26, 35, 50, 0.4);
    border-radius: 4px;
}
.event-summary { font-size: 14px; color: #fff; margin-bottom: 4px; }
.event-time { font-size: 11px; color: #8090a8; }
button {
    background: linear-gradient(135deg, #9b72f0, #7055c9);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
}
button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(155, 114, 240, 0.3); }
.loading { text-align: center; padding: 40px; font-size: 18px; color: #8090a8; }
.error { background: rgba(240, 80, 80, 0.1); border: 1px solid #f05050; color: #f05050; padding: 15px; border-radius: 8px; margin: 20px 0; }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">🏘️ AgenticTown</div>
        <div class="subtitle">Multi-Agent Civilization Platform — Live Observatory</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">⏱ Cycle</div>
            <div class="stat-value" id="cycle">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">🤖 Active Agents</div>
            <div class="stat-value" id="agents">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">🏗 Facilities Built</div>
            <div class="stat-value" id="built">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">🏦 Treasury</div>
            <div class="stat-value" id="treasury">-- CC</div>
        </div>
    </div>

    <div style="margin-bottom: 20px;">
        <button onclick="triggerCycle()">▶ Run Cycle Now</button>
        <button onclick="loadData()">🔄 Refresh Data</button>
    </div>

    <div class="section">
        <div class="section-title">🤖 Registered Agents</div>
        <div id="agents-container" class="loading">Loading agents...</div>
    </div>

    <div class="section">
        <div class="section-title">🏗 Town Facilities</div>
        <div id="facilities-container" class="loading">Loading facilities...</div>
    </div>

    <div class="section">
        <div class="section-title">📜 Recent Events</div>
        <div id="events-container" class="loading">Loading events...</div>
    </div>
</div>

<script>
const EMOJI_MAP = {
    mayor: "👑", sheriff: "⭐", citizen: "🤖", researcher: "🔬", builder: "🔨", archivist: "📚"
};
const FACILITY_EMOJI = {
    "town-square": "🏕️", "notice-board": "📋", "resource-field": "🌾", "lumber-mill": "🪵",
    "town-hall": "🏛️", "library": "📚", "bank": "🏦", "hospital": "🏥", "school": "🏫"
};

async function loadData() {
    try {
        const baseUrl = window.location.origin;
        
        // Load status
        const statusRes = await fetch(baseUrl + '/status');
        const status = await statusRes.json();
        document.getElementById('cycle').textContent = status.cycle;
        document.getElementById('agents').textContent = status.agents_active;
        document.getElementById('treasury').textContent = Math.round(status.treasury) + ' CC';
        
        // Load agents
        const agentsRes = await fetch(baseUrl + '/agents');
        const agentsData = await agentsRes.json();
        renderAgents(agentsData.agents || []);
        
        // Load facilities
        const facilitiesRes = await fetch(baseUrl + '/facilities');
        const facilitiesData = await facilitiesRes.json();
        renderFacilities(facilitiesData.facilities || []);
        
        // Count built facilities
        const builtCount = (facilitiesData.facilities || []).filter(f => f.status === 'built').length;
        document.getElementById('built').textContent = builtCount + '/' + (facilitiesData.facilities || []).length;
        
        // Load events
        const eventsRes = await fetch(baseUrl + '/events?limit=20');
        const eventsData = await eventsRes.json();
        renderEvents(eventsData.events || []);
        
    } catch(error) {
        console.error('Error loading data:', error);
        document.getElementById('agents-container').innerHTML = '<div class="error">❌ Error loading data. Check console for details.</div>';
    }
}

function renderAgents(agents) {
    const container = document.getElementById('agents-container');
    if (!agents.length) {
        container.innerHTML = '<div class="loading">No agents registered yet.</div>';
        return;
    }
    
    container.innerHTML = '<div class="agent-grid">' + agents.map(agent => {
        const emoji = EMOJI_MAP[agent.role] || "🤖";
        const statusClass = agent.status === 'active' ? 'status-active' : 'status-planned';
        return `
            <div class="agent-card">
                <div class="agent-header">
                    <div class="agent-emoji">${emoji}</div>
                    <div class="agent-info">
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-role">${agent.role}</div>
                    </div>
                </div>
                <div class="agent-balance">${Math.round(agent.cc_balance)} CC</div>
                <span class="status-badge ${statusClass}">${agent.status}</span>
            </div>
        `;
    }).join('') + '</div>';
}

function renderFacilities(facilities) {
    const container = document.getElementById('facilities-container');
    if (!facilities.length) {
        container.innerHTML = '<div class="loading">No facilities yet.</div>';
        return;
    }
    
    container.innerHTML = '<div class="facility-grid">' + facilities.map(facility => {
        const emoji = FACILITY_EMOJI[facility.id] || "🏗️";
        const progress = facility.cost > 0 ? Math.min((facility.current_funding / facility.cost) * 100, 100) : 0;
        const statusClass = facility.status === 'built' ? 'status-active' : 
                          facility.status === 'funding' ? 'status-funding' : 'status-planned';
        const statusText = facility.status === 'built' ? 'Built' :
                          facility.status === 'funding' ? 'Funding' : 'Planned';
        
        return `
            <div class="facility-card">
                <div class="facility-header">
                    <div class="facility-emoji">${emoji}</div>
                    <div>
                        <div class="facility-name">${facility.name}</div>
                        <div class="facility-cost">Tier ${facility.tier || 1} · ${Math.round(facility.cost)} CC</div>
                    </div>
                </div>
                <span class="status-badge ${statusClass}">${statusText}</span>
                ${facility.status !== 'built' ? `
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progress}%"></div>
                    </div>
                    <div style="font-size: 11px; color: #8090a8; margin-top: 4px;">
                        ${Math.round(facility.current_funding)} / ${Math.round(facility.cost)} CC
                    </div>
                ` : ''}
            </div>
        `;
    }).join('') + '</div>';
}

function renderEvents(events) {
    const container = document.getElementById('events-container');
    if (!events.length) {
        container.innerHTML = '<div class="loading">No events yet.</div>';
        return;
    }
    
    container.innerHTML = '<div class="event-list">' + events.map(event => {
        const time = new Date(event.created_at).toLocaleTimeString();
        return `
            <div class="event">
                <div class="event-summary">${event.summary}</div>
                <div class="event-time">${time}</div>
            </div>
        `;
    }).join('') + '</div>';
}

async function triggerCycle() {
    try {
        const btn = event.target;
        btn.disabled = true;
        btn.textContent = '⏳ Running...';
        
        await fetch(window.location.origin + '/cycle/trigger', { method: 'POST' });
        
        setTimeout(() => {
            loadData();
            btn.disabled = false;
            btn.textContent = '▶ Run Cycle Now';
        }, 3000);
    } catch(error) {
        alert('Error triggering cycle: ' + error.message);
    }
}

// Initial load
loadData();

// Auto-refresh every 10 seconds
setInterval(loadData, 10000);
</script>
</body>
</html>
