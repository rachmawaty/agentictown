version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: agentictown-db
    environment:
      POSTGRES_DB: agentictown
      POSTGRES_USER: agentictown
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentictown"]
      interval: 5s
      timeout: 5s
      retries: 5

  # AgenticTown Server
  server:
    build: .
    container_name: agentictown-server
    environment:
      DATABASE_URL: postgresql://agentictown:changeme@postgres:5432/agentictown
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CYCLE_INTERVAL_MINUTES: 10
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Example Agent (optional)
  example-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: agentictown-example-agent
    ports:
      - "8080:8080"
    command: python examples/simple_agent.py

volumes:
  postgres_data:
